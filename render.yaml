# Render now rides the same Docker backend contract as Railway, Fly.io, and
# Cloud Run so deployment does not depend on Render-specific Python behavior.
# The container owns both the Node server and the nested Python extraction
# worker installed from server/documentRuntime/python/requirements.txt.
services:
  - type: web
    name: zootopia-club-ai
    env: docker
    dockerContext: .
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DOCUMENT_RUNTIME_PYTHON_EXECUTABLE
        value: /app/.venv/bin/python
