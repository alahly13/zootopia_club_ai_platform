# Native Render contract for the current single-service Node + nested Python
# worker architecture. Do not pin OS-specific binary packages directly in
# package.json; Render must install the generic Vite/Tailwind toolchain and let
# upstream packages resolve the correct Linux-native optional binaries.
services:
  - type: web
    name: zootopia-club-ai
    env: node
    buildCommand: npm run deploy:render:build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DOCUMENT_RUNTIME_PYTHON_EXECUTABLE
        value: .venv/bin/python
